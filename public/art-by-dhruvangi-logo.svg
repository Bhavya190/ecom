<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Art by Dhruvangi</title>
  <desc id="desc">Pink circular badge logo for Art by Dhruvangi, Resin Artist.</desc>
  <defs>
    <linearGradient id="badge" x1="40" y1="28" x2="216" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9C8D0"/>
      <stop offset="0.48" stop-color="#FFBE98"/>
      <stop offset="1" stop-color="#C9B8E8"/>
    </linearGradient>
    <path id="topArc" d="M50 132a78 78 0 0 1 156 0"/>
    <path id="bottomArc" d="M206 132a78 78 0 0 1-156 0"/>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#9f5d66" flood-opacity="0.22"/>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="112" fill="#FDF6EC"/>
  <circle cx="128" cy="128" r="99" fill="url(#badge)" filter="url(#shadow)"/>
  <circle cx="128" cy="128" r="76" fill="#FDF6EC" opacity="0.9"/>
  <circle cx="88" cy="74" r="18" fill="#E8C97A" opacity="0.7"/>
  <circle cx="178" cy="92" r="15" fill="#A8D8C8" opacity="0.8"/>
  <circle cx="168" cy="181" r="20" fill="#C9B8E8" opacity="0.65"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#2D2D2D" letter-spacing="1.2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">ART BY DHRUVANGI</textPath>
  </text>
  <text font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#2D2D2D" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">RESIN ARTIST</textPath>
  </text>
  <text x="128" y="124" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#1A1A2E">Art</text>
  <text x="128" y="153" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2D2D2D">by Dhruvangi</text>
  <path d="M88 165c21 16 58 16 80 0" fill="none" stroke="#E8C97A" stroke-width="5" stroke-linecap="round"/>
</svg>
