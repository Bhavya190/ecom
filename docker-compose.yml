services:
  postgres:
    image: postgres:16-alpine
    container_name: small-business-shop-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppassword
      POSTGRES_DB: shopdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
